<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club62 - Network Tree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .tree-node { 
            border: 1px solid rgba(234, 179, 8, 0.4); 
            background: rgba(0,0,0,0.8); 
            padding: 12px; 
            border-radius: 12px; 
            min-width: 120px; 
            text-align: center; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .tree-node:hover { background: rgba(234, 179, 8, 0.1); border-color: #eab308; }
        .child-wrapper { display: flex; gap: 20px; margin-top: 20px; }
        .tooltip { position: absolute; background: #1e293b; border: 1px solid #3b82f6; padding: 10px; border-radius: 8px; z-index: 100; font-size: 10px; display: none; pointer-events: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <main class="max-w-7xl mx-auto">
        <h2 class="text-2xl font-black orbitron mb-10 uppercase text-blue-500 text-center">My Network Tree</h2>
        
        <div id="tree-root" class="flex flex-col items-center gap-4 overflow-x-auto pb-20">
            <div id="root-node" class="tree-node border-blue-500" 
                 onclick="expandNode(this, localStorage.getItem('userAddress'))"
                 onmouseover="showDetails(this, localStorage.getItem('userAddress'))">
                <p class="text-[10px] text-blue-400 font-mono">My Wallet</p>
                <p class="text-[8px] text-gray-500">Click to expand</p>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="web3-handler.js"></script>
    <script>
        lucide.createIcons();

        // 1. ट्री एक्सपैंड फंक्शन
        async function expandNode(element, address) {
            if (!address || address === "0x0000000000000000000000000000000000000000") return;
            if (element.nextElementSibling && element.nextElementSibling.classList.contains('child-wrapper')) {
                element.nextElementSibling.remove();
                return;
            }

            try {
                const children = await window.contract.getUserTree(address);
                let html = `<div class="child-wrapper animate-in fade-in zoom-in duration-300">`;

                [children.left, children.right].forEach(childAddr => {
                    const hasChild = childAddr !== "0x0000000000000000000000000000000000000000";
                    html += `
                        <div class="flex flex-col items-center">
                            <div class="tree-node ${hasChild ? '' : 'opacity-40'}" 
                                 onclick="expandNode(this, '${childAddr}')" 
                                 onmouseover="showDetails(this, '${childAddr}')">
                                <p class="text-[9px] font-mono">${hasChild ? childAddr.substring(0,8) + '...' : 'EMPTY'}</p>
                            </div>
                        </div>`;
                });
                html += `</div>`;
                element.insertAdjacentHTML('afterend', html);
            } catch (err) { console.error("Error fetching tree:", err); }
        }

        // 2. ऑटो-एक्सपेंशन
        window.addEventListener('load', async () => {
            await new Promise(r => setTimeout(r, 2000));
            const root = document.getElementById('root-node');
            await expandNode(root, localStorage.getItem('userAddress'));
            setTimeout(() => {
                document.querySelectorAll('.child-wrapper .tree-node').forEach(child => child.click());
            }, 500);
        });

        // 3. टूलटिप फंक्शन
        // 3. टूलटिप फंक्शन (Mouse Leave पर तुरंत गायब होगा)
async function showDetails(el, address) {
    if (!address || address === "0x0000000000000000000000000000000000000000") return;
    
    // पुरानी टूलटिप्स को साफ़ करें
    document.querySelectorAll('.tooltip').forEach(t => t.remove());

    const details = await window.getUserShortDetails(address);
    if (!details) return;
    
    const tooltip = document.createElement('div');
    tooltip.className = 'tooltip';
    tooltip.style.display = 'block'; // दिखाना शुरू करें
    tooltip.innerHTML = `
        <div class="space-y-1">
            <p class="text-blue-400 font-mono text-[9px] border-b border-blue-800 pb-1">${address.substring(0,10)}...</p>
            <p>Directs: <span class="text-white">${details.directCount}</span></p>
            <p>Paid Directs: <span class="text-white">${details.paidDirectCount}</span></p>
            <p>Direct Income: <span class="text-green-400">${details.directIncome}</span></p>
            <p>Level Income: <span class="text-purple-400">${details.levelIncome}</span></p>
            <p>Total Earned: <span class="text-yellow-400">${details.totalEarned}</span></p>
        </div>
    `;
    document.body.appendChild(tooltip);
    
    // माउस मूव होने पर टूलटिप को फॉलो करवाएं
    el.onmousemove = (e) => { 
        tooltip.style.left = (e.pageX + 15) + 'px'; 
        tooltip.style.top = (e.pageY + 15) + 'px'; 
    };

    // माउस हटते ही तुरंत गायब करें
    el.onmouseleave = () => {
        tooltip.remove();
    };
}
    </script>
</body>
</html>
