<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club62 - Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="style1.css">
</head>
<body class="p-4 md:p-10">

    <main class="max-w-7xl mx-auto space-y-6">
        
        <!-- User Header Section -->
        <div class="premium-card">
            <div class="inner-content !block">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <div class="info-row">
                            <div class="flex items-center gap-3"><i data-lucide="wallet" class="text-yellow-600 w-4 h-4"></i><span class="label-text">Address:</span></div>
                            <span id="user-address" class="text-xs font-mono text-blue-300 truncate">loading</span>
                        </div>
                        <div class="info-row">
                            <div class="flex items-center gap-3"><i data-lucide="user" class="text-yellow-600 w-4 h-4"></i><span class="label-text">Referrer:</span></div>
                            <span id="referrer-address" class="text-sm font-bold uppercase orbitron">loading</span>
                        </div>
                    </div>
                    <div class="flex flex-col justify-center bg-black/40 p-5 rounded-2xl border border-white/5">
                        <p class="label-text text-center mb-3">Invitation Link</p>
                        <div class="flex items-center bg-black border border-white/10 rounded-xl p-1.5 pl-4">
                            <input id="refURL" type="text" readonly value="loading" class="bg-transparent border-none outline-none w-full text-xs font-mono text-gray-400">
                            <button onclick="copyLink()" class="btn-gold-pro px-6 py-2 rounded-lg text-[10px]">Copy</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Income Overview Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
            <div class="premium-card"><div class="inner-content stat-box">
                <p class="label-text">Direct Income</p>
                <h3 class="amount-text orbitron"><span id="direct-income">0.00</span></h3>
            </div></div>
            <div class="premium-card"><div class="inner-content stat-box">
                <p class="label-text">Level Income</p>
                <h3 class="amount-text orbitron"><span id="level-income">0.00</span></h3>
            </div></div>
            <div class="premium-card"><div class="inner-content stat-box">
                <p class="label-text">Salary Income</p>
                <h3 class="amount-text orbitron"><span id="salary-income">0.00</span></h3>
            </div></div>
            <div class="premium-card"><div class="inner-content stat-box">
                <p class="label-text">Total Earned</p>
                <h3 class="amount-text orbitron text-yellow-500"><span id="total-earned">0.00</span></h3>
            </div></div>
        </div>

        <!-- Stock & Withdraw Section -->
        <div class="premium-card p-8 border border-yellow-500/20">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div>
                    <p class="label-text mb-2">Available Stock Tokens</p>
                    <h3 class="text-3xl font-black orbitron text-yellow-500"><span id="total-stock-display">0.00</span></h3>
                </div>
                <div class="flex gap-4 w-full md:w-auto">
                    <input type="number" id="withdraw-stock-amount" placeholder="Amount" class="bg-black/50 border border-white/10 rounded-xl px-4 py-4 w-full text-white">
                    <button onclick="handleWithdrawStockAmount()" class="btn-outline-pro px-6 py-4 rounded-xl text-xs orbitron uppercase">Withdraw Stock</button>
                    <button onclick="handleWithdraw()" class="btn-gold-pro px-10 py-4 rounded-xl text-xs orbitron uppercase">Withdraw All Income</button>
                </div>
            </div>
        </div>

        <!-- Phase Activation -->
        <div class="premium-card p-6">
            <h3 class="text-xs font-black orbitron mb-6 uppercase italic text-yellow-500 tracking-widest">Activate Phases</h3>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-3">
                <button onclick="handleActivatePhase(1)" class="btn-outline-pro py-3 rounded-lg text-[10px]">Phase 1</button>
                <button onclick="handleActivatePhase(2)" class="btn-outline-pro py-3 rounded-lg text-[10px]">Phase 2</button>
                <button onclick="handleActivatePhase(3)" class="btn-outline-pro py-3 rounded-lg text-[10px]">Phase 3</button>
                <button onclick="handleActivatePhase(4)" class="btn-outline-pro py-3 rounded-lg text-[10px]">Phase 4</button>
                <button onclick="handleActivatePhase(5)" class="btn-outline-pro py-3 rounded-lg text-[10px]">Phase 5</button>
                <button onclick="handleActivatePhase(6)" class="btn-outline-pro py-3 rounded-lg text-[10px]">Phase 6</button>
            </div>
        </div>

        <!-- Matrix Levels Section -->
        <div class="premium-card p-6 mt-6">
            <h3 class="text-xs font-black orbitron mb-6 uppercase italic text-yellow-500 tracking-widest">Select Phase & Buy Level</h3>
            <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
                <button onclick="renderLevels(1)" class="btn-outline-pro px-4 py-2 rounded-lg text-[10px]">Phase 1</button>
                <button onclick="renderLevels(2)" class="btn-outline-pro px-4 py-2 rounded-lg text-[10px]">Phase 2</button>
                <button onclick="renderLevels(3)" class="btn-outline-pro px-4 py-2 rounded-lg text-[10px]">Phase 3</button>
                <button onclick="renderLevels(4)" class="btn-outline-pro px-4 py-2 rounded-lg text-[10px]">Phase 4</button>
                <button onclick="renderLevels(5)" class="btn-outline-pro px-4 py-2 rounded-lg text-[10px]">Phase 5</button>
                <button onclick="renderLevels(6)" class="btn-outline-pro px-4 py-2 rounded-lg text-[10px]">Phase 6</button>
            </div>
            <div id="levels-container" class="grid grid-cols-2 md:grid-cols-5 gap-4">
                <p class="text-gray-500 text-xs">Select a Phase to view levels...</p>
            </div>
        </div>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="components.js"></script>
    <script src="web3-handler.js"></script>
    
    <script>
        lucide.createIcons();
        function copyLink() {
            const refInput = document.getElementById('refURL');
            if(refInput.value && refInput.value !== "loading") {
                navigator.clipboard.writeText(refInput.value);
                alert("Referral Link Copied!");
            }
        }
    </script>
</body>
</html>
