<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income History | Club62</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #050505; color: white; }
        .history-row:hover { background: rgba(255, 255, 255, 0.03); }
    </style>
</head>
<body class="p-4 md:p-10">

    <main class="max-w-7xl mx-auto space-y-8">
        <h2 class="text-2xl font-black orbitron uppercase text-yellow-500">Income History</h2>

        <div class="premium-card p-6">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[10px] text-gray-500 uppercase tracking-widest border-b border-white/10">
                            <th class="p-4">Type</th>
                            <th class="p-4">Amount (K62)</th>
                            <th class="p-4">From User</th>
                            <th class="p-4">Phase</th>
                            <th class="p-4">Date</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body">
                        <tr><td colspan="5" class="p-10 text-center text-gray-600">Loading History...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="web3-handler.js"></script>
    <script>
        lucide.createIcons();

        async function loadHistory() {
            const tbody = document.getElementById('history-table-body');
            try {
                const address = await window.signer.getAddress();
                // कॉन्ट्रैक्ट से इनकम हिस्ट्री लाएं
                const history = await window.contract.getIncomeHistory(address);

                if (history.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-gray-600">No history found.</td></tr>`;
                    return;
                }

                let html = '';
                // हिस्ट्री को उल्टा दिखाएं (नया सबसे ऊपर)
                for (let i = history.length - 1; i >= 0; i--) {
                    const record = history[i];
                    const amount = parseFloat(ethers.utils.formatUnits(record.amount, 18)).toFixed(2);
                    const date = new Date(record.timestamp * 1000).toLocaleString();
                    
                    html += `
                        <tr class="history-row border-b border-white/5 text-xs font-mono">
                            <td class="p-4 font-bold text-blue-400">${record.incomeType}</td>
                            <td class="p-4 text-green-400">+${amount}</td>
                            <td class="p-4 text-gray-400">${record.fromUser.substring(0,8)}...</td>
                            <td class="p-4 text-gray-400">Phase ${record.phaseId}</td>
                            <td class="p-4 text-gray-500">${date}</td>
                        </tr>
                    `;
                }
                tbody.innerHTML = html;
            } catch (err) {
                console.error("History Load Error:", err);
                tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-500">Error loading history.</td></tr>`;
            }
        }

        window.addEventListener('load', async () => {
            await new Promise(r => setTimeout(r, 2000));
            if(window.signer) loadHistory();
        });
    </script>
</body>
</html>
